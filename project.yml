name: PlannerApp
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

# Terminal emulator used by the Mac edition's embedded Hermes agent panel (Mac target only).
# Pinned to 1.11.2 — 1.12.0 added a Metal GPU backend that requires the (multi-GB, often
# uninstalled) Xcode Metal toolchain to compile; the CPU renderer is plenty for this panel.
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: 1.11.2

settings:
  base:
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "19"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: GU9WTSTX9M
    CODE_SIGN_STYLE: Automatic

targets:
  PlannerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlannerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.plannerapp
        INFOPLIST_FILE: PlannerApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlannerApp/PlannerApp.entitlements
        DEVELOPMENT_TEAM: GU9WTSTX9M
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"

  # Desktop (macOS) edition, distributed as a DMG via scripts/build-macos-dmg.sh.
  # Shares the models, services, theme and the cross-platform views with the iOS app;
  # the Mac-only two-column UI lives in PlannerAppMac/.
  PlannerAppMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PlannerAppMac
      - path: PlannerApp/Models
      - path: PlannerApp/Services
      - path: PlannerApp/Theme
      - path: PlannerApp/Assets.xcassets
      - path: PlannerApp/Views/ItemRow.swift
      - path: PlannerApp/Views/AddItemView.swift
      - path: PlannerApp/Views/ListsManagerView.swift
      - path: PlannerApp/Views/CalendarView.swift
      - path: PlannerApp/Views/ArchiveView.swift
      - path: PlannerApp/Views/FeedbackView.swift
      - path: PlannerApp/Views/AboutView.swift
      - path: PlannerApp/Views/RemindersSettingsView.swift
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_NAME: Planner
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.plannerapp
        INFOPLIST_FILE: PlannerAppMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlannerAppMac/PlannerAppMac.entitlements
        DEVELOPMENT_TEAM: GU9WTSTX9M
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
